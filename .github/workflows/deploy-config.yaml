name: Deploy Apigee Config

on:
  push:
    branches:
      - main
    paths:
      - 'apigee-config/**'

jobs:
  deploy-config:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install apigeecli
        run: |
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

      - name: Get Access Token
        run: echo "TOKEN=$(gcloud auth print-access-token)" >> $GITHUB_ENV

      - name: Inject Secrets
        run: |
          sed -i "s|#{API_KEY}#|${{ secrets.API_KEY }}|g" apigee-config/prod/kvms.json
          sed -i "s|#{DB_PASSWORD}#|${{ secrets.DB_PASSWORD }}|g" apigee-config/prod/kvms.json

      - name: Deploy KVMs
        run: |
          apigeecli kvms import \
            -o ${{ vars.APIGEE_ORG }} \
            -f apigee-config/prod \
            -t $TOKEN

      - name: Deploy Target Servers
        run: |
          apigeecli targetservers import \
            -o ${{ vars.APIGEE_ORG }} \
            -e ${{ vars.APIGEE_ENV }} \
            -f apigee-config/prod \
            -t $TOKEN

      - name: Done
        run: echo "✅ Config deployed successfully"