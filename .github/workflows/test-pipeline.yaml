name: Apigee CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Verify Apigee Proxy Exists
      run: |
        echo "Checking for Apigee proxy..."
        if [ -d "hello-api/apiproxy" ]; then
          echo "Proxy found ✅"
        else
          echo "Proxy NOT found ❌"
          exit 1
        fi

    # 🔥 Step 1: Install apigeecli
    - name: Install apigeecli
      run: |
        echo "Installing apigeecli..."
        curl -L https://github.com/apigee/apigeecli/releases/latest/download/apigeecli_Linux_x86_64.tar.gz -o apigeecli.tar.gz
        tar -xvzf apigeecli.tar.gz
        sudo mv apigeecli /usr/local/bin/
        apigeecli version

    # 🔐 Step 2: Authenticate (will work after SA is added)
    - name: Authenticate to GCP
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > key.json
        gcloud auth activate-service-account --key-file=key.json
        gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

    # 🚀 Step 3: Deploy Proxy (REAL COMMAND)
    - name: Deploy Apigee Proxy
      run: |
        echo "Deploying proxy..."
        apigeecli apis create bundle \
          -n hello-api \
          -p hello-api/apiproxy \
          -o ${{ secrets.APIGEE_ORG }} \
          -t $(gcloud auth print-access-token)

        apigeecli apis deploy \
          -n hello-api \
          -e ${{ secrets.APIGEE_ENV }} \
          -o ${{ secrets.APIGEE_ORG }} \
          -t $(gcloud auth print-access-token)

        echo "Deployment completed 🚀"