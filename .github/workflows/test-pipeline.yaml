name: Apigee CI/CD (WIF - Curl Deploy)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    # 📥 Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔐 Authenticate via WIF
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # ☁️ Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # 🔧 Install dependencies
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip unzip

    # 📦 Zip proxy
    - name: Zip Apigee Proxy
      run: |
        cd hello-api
        zip -r ../proxy.zip apiproxy
        cd ..

        unzip -l proxy.zip

    # 🚀 Deploy to Apigee (NO CLI)
    - name: Deploy to Apigee
      run: |
        echo "Deploying proxy..."

        ACCESS_TOKEN=$(gcloud auth print-access-token)

        curl -X POST \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          "https://apigee.googleapis.com/v1/organizations/${{ vars.APIGEE_ORG }}/apis?action=import&name=hello-api" \
          --data-binary "@proxy.zip"

        echo "Deployment done 🚀"

    # 🧪 Smoke test
    - name: Smoke Test
      run: |
        curl -f https://136.110.222.127.nip.io/v1/hello