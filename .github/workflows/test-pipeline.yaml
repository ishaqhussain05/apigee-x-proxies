name: Apigee CI/CD (WIF - Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    # 📥 Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔍 Validate proxy
    - name: Verify Apigee Proxy
      run: |
        if [ -d "hello-api/apiproxy" ]; then
          echo "Proxy found ✅"
        else
          echo "Proxy not found ❌"
          exit 1
        fi

    # 🔐 Authenticate (WIF)
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # ☁️ Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # 🔧 Install tools
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq zip

    # 🔧 Install apigeecli
    - name: Install apigeecli
      run: |
        curl -L https://github.com/apigee/apigeecli/releases/latest/download/apigeecli_Linux_x86_64.tar.gz -o apigeecli.tar.gz
        tar -xvzf apigeecli.tar.gz
        sudo mv apigeecli /usr/local/bin/
        apigeecli version

    # 🚀 Deploy proxy
    - name: Deploy Apigee Proxy
      run: |
        echo "Deploying hello-api..."

        TOKEN=$(gcloud auth print-access-token)

        apigeecli apis create bundle \
          -n hello-api \
          -p hello-api/apiproxy \
          -o ${{ vars.APIGEE_ORG }} \
          -t $TOKEN

        apigeecli apis deploy \
          -n hello-api \
          -e ${{ vars.APIGEE_ENV }} \
          -o ${{ vars.APIGEE_ORG }} \
          -t $TOKEN

        echo "Deployment successful 🚀"

    # 🧪 Smoke test
    - name: Smoke Test API
      run: |
        echo "Running smoke test..."

        curl -f https://YOUR_API_DOMAIN/v1/hello

        echo "API is working ✅"