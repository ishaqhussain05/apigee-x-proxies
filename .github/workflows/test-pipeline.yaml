name: Test CI/CD Pipeline

on:
  push:
    branches:
      - main   # auto trigger on push/merge to main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Print Current Directory
      run: pwd

    - name: List All Files
      run: ls -R

    - name: Verify Apigee Proxy Exists
      run: |
        echo "Checking for Apigee proxy..."
        if [ -d "hello-api/apiproxy" ]; then
          echo "Proxy found ✅"
        else
          echo "Proxy NOT found ❌"
          exit 1
        fi

    - name: Simulate Build
      run: |
        echo "Building Apigee Proxy..."
        sleep 2
        echo "Build completed successfully ✅"

    - name: Simulate Deployment
      run: |
        echo "Deploying proxy to Apigee..."
        sleep 2
        echo "Deployment successful 🚀"