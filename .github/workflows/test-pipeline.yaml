name: Apigee CI/CD (WIF - Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    # 📥 Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🔍 Validate proxy exists
    - name: Verify Apigee Proxy
      run: |
        if [ -d "hello-api/apiproxy" ]; then
          echo "Proxy found ✅"
        else
          echo "Proxy not found ❌"
          exit 1
        fi

    # 🔐 Authenticate using WIF
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    # ☁️ Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # 🔧 Install dependencies
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq zip

    # 🔧 Install apigeecli (FIXED)
    - name: Install apigeecli
      run: |
        echo "Installing apigeecli..."

        curl -L -H "Accept: application/octet-stream" \
        https://github.com/apigee/apigeecli/releases/latest/download/apigeecli_linux_amd64 \
        -o apigeecli

        chmod +x apigeecli

        file apigeecli

        sudo mv apigeecli /usr/local/bin/

        apigeecli version

    # 🚀 Deploy proxy
    - name: Deploy Apigee Proxy
      run: |
        echo "Deploying hello-api..."

        TOKEN=$(gcloud auth print-access-token)

        apigeecli apis create bundle \
          -n hello-api \
          -p hello-api/apiproxy \
          -o ${{ vars.APIGEE_ORG }} \
          -t $TOKEN

        apigeecli apis deploy \
          -n hello-api \
          -e ${{ vars.APIGEE_ENV }} \
          -o ${{ vars.APIGEE_ORG }} \
          -t $TOKEN

        echo "Deployment successful 🚀"

    # 🧪 Smoke test (UPDATE DOMAIN IF NEEDED)
    - name: Smoke Test API
      run: |
        echo "Running smoke test..."

        curl -f https://136.110.222.127.nip.io/v1/hello

        echo "API is working ✅"